##### Default Shell #############################################################
set-option -g default-shell /opt/homebrew/bin/fish

##### TERMINAL & COLOR ##########################################################

set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -ga terminal-overrides ",alacritty:RGB,ghostty:RGB,wezterm:RGB"
set -ga terminal-features ",*:hyperlinks"
set -s  focus-events on
set -g  set-clipboard on

##### INPUT & TIMING ############################################################

set -sg escape-time  0
set -sg repeat-time  300
set -g  assume-paste-time 1
set -g  display-time 2000

##### PREFIX ####################################################################

unbind C-b
unbind C-a
set -g prefix C-a
bind C-a send-prefix

##### MOUSE #####################################################################

set -g mouse on

##### INDEXING ##################################################################

set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on

##### WINDOW & PANE DEFAULTS ####################################################

setw -g mode-keys vi
setw -g xterm-keys on
setw -g aggressive-resize on
set -g  history-limit 100000

# Auto-rename windows to the running command; show [copy] in copy mode
set -g  automatic-rename on
set -g  automatic-rename-format "#{?pane_in_mode,[copy],#{pane_current_command}}"

##### FLOATING SCRATCH PANE #####################################################
# Plain shell popup — no nested tmux, no double status bar
# M-p → open, q/Ctrl+d/exit to dismiss

bind -n M-p display-popup \
  -E -w 80% -h 80% \
  -d "#{pane_current_path}"

##### ZELLIJ-STYLE PANE NAVIGATION (no prefix, opt = M) ########################

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

##### PANE SPLITS ###############################################################
# | → split right, - → split down (preserve cwd)

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# opt+x — no confirm for multi-pane; confirm only when killing the last pane
bind -n M-x if-shell "[ #{window_panes} -gt 1 ]" \
  "kill-pane" \
  "confirm-before -p 'last pane — kill window? (y/n)' kill-pane"

##### ZELLIJ-STYLE PANE RESIZE (prefix + hjkl, repeatable) #####################

bind -r h resize-pane -L 5
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5

# Zoom toggle (zellij opt+f = fullscreen)
bind -n M-f resize-pane -Z

##### ZELLIJ-STYLE TAB / WINDOW NAVIGATION ######################################

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# opt+t → new tab/window (zellij)
bind -n M-t new-window -c "#{pane_current_path}"

# opt+w → close tab (zellij)
bind -n M-w confirm-before -p "kill window? (y/n)" kill-window

# opt+[ / opt+] → prev/next tab
bind -n M-[ previous-window
bind -n M-] next-window

# Tab → last window (quick toggle)
bind Tab last-window

# Reorder windows left/right
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

##### SESSION MANAGEMENT ########################################################

bind C-c new-session
bind C-f command-prompt -p "session:" "switch-client -t %%"
bind BTab switch-client -l

# Don't exit tmux when killing a session
set -g detach-on-destroy off

# sesh: fzf popup — ^a=all ^t=tmux ^g=configs ^x=zoxide ^f=find ^d=kill
bind -n M-s run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi \
    --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}' \
)\""

# sesh last — switch to second-to-last attached session (works even after kill)
bind L run-shell "sesh last || tmux display-message 'Only one session'"

# sesh root — jump to root session of current git repo/worktree
bind 9 run-shell "sesh connect --root $(pwd)"

##### COPY MODE (VI) ############################################################

bind Enter copy-mode

bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi y      send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi H      send -X start-of-line
bind -T copy-mode-vi L      send -X end-of-line
bind -T copy-mode-vi /      send -X search-forward
bind -T copy-mode-vi ?      send -X search-backward
bind -T copy-mode-vi n      send -X search-again
bind -T copy-mode-vi N      send -X search-reverse

##### BUFFERS ###################################################################

bind b list-buffers
bind p paste-buffer -p
bind P choose-buffer

##### ACTIVITY ##################################################################

set -g monitor-activity on
set -g visual-activity off

##### STATUS BAR ################################################################

set -g status-interval     1       # smooth clock ticks
set -g status-left-length  40
set -g status-right-length 120
set -g set-titles          on
set -g set-titles-string   "#S  #W"
set -g status-position     bottom

##### PLUGINS ###################################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3'

##### CATPPUCCIN ################################################################

set -g @catppuccin_flavor 'mocha'

# Window style — rounded tabs, show window name + zoom indicator
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text         "#W"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,  ,}"

# Pane border — active pane subtly highlighted
set -g @catppuccin_pane_active_border_style "fg=#{@thm_mauve}"
set -g @catppuccin_pane_border_style        "fg=#{@thm_surface_1}"

# Status module colors — distinct mocha accents per module
set -g @catppuccin_session_color   "#{@thm_mauve}"   # purple — session name
set -g @catppuccin_date_time_color "#{@thm_blue}"    # blue   — clock
set -g @catppuccin_cpu_color       "#{@thm_green}"   # green  — cpu
set -g @catppuccin_battery_color   "#{@thm_peach}"   # peach  — battery
set -g @catppuccin_uptime_color    "#{@thm_teal}"    # teal   — uptime

# Date format
set -g @catppuccin_date_time_text "%a %d %b  %H:%M"

run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# ── Left: session pill ───────────────────────────────────────────────────────
set -g @catppuccin_session_text " #S"         #  icon + session name
set -g status-left-length 60
set -g status-left "#{E:@catppuccin_status_session}"

# ── Right: cpu · battery · date/time · uptime ────────────────────────────────
set -gF  status-right  "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag  status-right "#{E:@catppuccin_status_date_time}"
set -ag  status-right "#{E:@catppuccin_status_uptime}"

##### RESURRECT #################################################################

set -g @resurrect-capture-pane-contents 'on'
# Use prefix+C-r to restore manually when you want it

##### RELOAD ####################################################################

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "  tmux.conf reloaded"

##### TPM (MUST BE LAST) ########################################################

run '~/.tmux/plugins/tpm/tpm'
