"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$line_break\
$python\
$character"""

[character]
success_symbol = '[тЮЬ](bold green) '
error_symbol = '[тЬЧ](bold red) '

[directory]
style = "blue"

[git_branch]
format = "[$branch]($style)"
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "тАЛ"
untracked = "тАЛ"
modified = "тАЛ"
staged = "тАЛ"
renamed = "тАЛ"
deleted = "тАЛ"
stashed = "тЙб"

[kubernetes]
format = 'on [тЫ╡ $context ](dimmed green) '
disabled = false
contexts = [
  { context_pattern = "dev.local.cluster.k8s", style = "green", symbol = "ЁЯТФ " },
]

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"
