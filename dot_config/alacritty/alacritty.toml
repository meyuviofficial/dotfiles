[window]
decorations = "None"
option_as_alt = "Both"

[font]
normal = { family = "JetBrainsMonoNL Nerd Font", style = "Regular" }
size = 16

[env]
TERM = "xterm-256color"
COLORTERM = "truecolor"

[general]
import = ["~/.config/alacritty/catppuccin-mocha.toml"]

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Underline", blinking = "On" }

[[keyboard.bindings]]
key = "h"
mods = "Alt"
chars = "\u001bh"

[[keyboard.bindings]]
key = "j"
mods = "Alt"
chars = "\u001bj"

[[keyboard.bindings]]
key = "k"
mods = "Alt"
chars = "\u001bk"

[[keyboard.bindings]]
key = "l"
mods = "Alt"
chars = "\u001bl"
